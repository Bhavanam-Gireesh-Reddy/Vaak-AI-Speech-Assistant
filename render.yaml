services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: meetwise-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        fromService:
          type: web
          name: meetwise-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: live_transcription
      - key: MONGO_COL
        value: sessions
      - key: MONGO_COL_USERS
        value: users
      - key: USE_REDIS
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_PLAN_ID_PRO
        sync: false

  # ── Next.js Frontend (Single Public URL) ─────────────────────────────────────
  # All traffic comes here. /api/* is transparently proxied to meetwise-api
  # via next.config.mjs rewrites — users only ever see ONE domain.
  - type: web
    name: meetwise-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # This is the internal FastAPI URL — Next.js rewrites proxy to it server-side
      - key: BACKEND_URL
        fromService:
          type: web
          name: meetwise-api
          envVarKey: RENDER_EXTERNAL_URL
