<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session History — Sarvam AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080c10;
      --surface: #0f1620;
      --surface2: #151f2e;
      --border: #1e2d40;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --success: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
      --text: #e2eaf4;
      --muted: #6b8299;
      --font-ui: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(0, 212, 255, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 90%, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
    }

    .logo-text span {
      color: var(--accent);
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-back {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-back:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      flex: 1;
      min-width: 140px;
    }

    .stat-card .val {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-mono);
    }

    .stat-card .lbl {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* ── Search & filter ── */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus {
      border-color: var(--accent);
    }

    .search-box::placeholder {
      color: var(--muted);
    }

    select.filter {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    /* ── Session list ── */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .session-card:hover {
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.06);
    }

    .session-card.expanded {
      border-color: rgba(0, 212, 255, 0.4);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
    }

    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    .card-meta .pill {
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 10px;
    }

    .pill.mode-translate {
      color: var(--accent);
      border-color: rgba(0, 212, 255, 0.3);
    }

    .pill.mode-transcribe {
      color: var(--success);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .pill.mode-codemix {
      color: var(--warn);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-icon.del:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .chevron {
      font-size: 11px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .session-card.expanded .chevron {
      transform: rotate(180deg);
    }

    /* ── Expanded transcript ── */
    .card-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }

    .session-card.expanded .card-body {
      display: block;
    }

    .transcript-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      padding: 16px 0 8px;
      max-height: 320px;
      overflow-y: auto;
    }

    .transcript-text::-webkit-scrollbar {
      width: 4px;
    }

    .transcript-text::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .card-body-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-sm {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-sm.copy {
      color: var(--accent);
      border-color: rgba(0, 212, 255, 0.3);
    }

    .btn-sm.dl {
      color: var(--success);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .btn-sm.copy:hover {
      background: rgba(0, 212, 255, 0.08);
    }

    .btn-sm.dl:hover {
      background: rgba(34, 197, 94, 0.08);
    }

    /* ── Empty / Loading states ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 42px;
      margin-bottom: 14px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 13px;
      font-family: var(--font-mono);
      opacity: 0.6;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* ── Translate & Share panels ────────────────────────── */
    .btn-sm.translate {
      color: #7c3aed;
      border-color: rgba(124, 58, 237, 0.3);
    }

    .btn-sm.translate:hover {
      background: rgba(124, 58, 237, 0.08);
    }

    .btn-sm.share {
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.3);
    }

    .btn-sm.share:hover {
      background: rgba(245, 158, 11, 0.08);
    }

    .translate-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .translate-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .translate-select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    .translate-result {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: var(--surface2);
      border-radius: 6px;
      border: 1px solid var(--border);
      display: none;
    }

    .translate-result.visible {
      display: block;
    }

    .translate-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(124, 58, 237, 0.3);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .share-panel {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-share {
      flex: 1;
      padding: 8px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .btn-share.email:hover {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.3);
      color: #00d4ff;
    }

    .btn-share.whatsapp:hover {
      background: rgba(34, 197, 94, 0.08);
      border-color: rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }

    /* ── Word Cloud modal ────────────────────────────────── */
    .wc-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }

    .wc-modal-overlay.open {
      display: flex;
    }

    .wc-modal {
      background: #0f1620;
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 620px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    .wc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .wc-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .wc-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    .wc-close:hover {
      color: var(--text);
    }

    #wcCanvas {
      width: 100% !important;
      border-radius: 8px;
      background: #080c10;
    }

    /* ── Search highlight ─────────────────────────────────── */
    .highlight {
      background: rgba(0, 212, 255, 0.25);
      color: var(--accent);
      border-radius: 3px;
      padding: 1px 2px;
    }

    /* ── Search field filter ──────────────────────────────── */
    .search-field-wrap {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 220px;
    }

    /* ── Print / PDF styles ───────────────────────────────── */
    @media print {
      body {
        background: white !important;
        color: black !important;
      }

      .page {
        max-width: 100%;
        padding: 0;
      }

      header,
      .stats-row,
      .toolbar,
      .card-actions,
      .card-body-actions,
      .translate-panel,
      .share-panel,
      .dl-dropdown,
      .btn-back {
        display: none !important;
      }

      .session-card {
        border: none !important;
        box-shadow: none !important;
        page-break-inside: avoid;
      }

      .card-body {
        display: block !important;
      }

      .transcript-text {
        max-height: none !important;
        overflow: visible !important;
        color: black !important;
      }

      .print-only {
        display: block !important;
      }
    }

    .print-only {
      display: none;
    }

    /* ── Download dropdown ───────────────────────────────── */
    .dl-dropdown {
      position: relative;
      display: inline-flex;
    }

    .dl-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #0f1620;
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      min-width: 210px;
      z-index: 9999;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .dl-menu.open {
      display: block;
    }

    .dl-menu button {
      display: block;
      width: 100%;
      padding: 9px 14px;
      text-align: left;
      background: transparent;
      border: none;
      color: #e2eaf4;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .dl-menu button:hover {
      background: rgba(0, 212, 255, 0.08);
      color: #00d4ff;
    }

    .dl-menu button:not(:last-child) {
      border-bottom: 1px solid #1e2d40;
    }

    /* ── Folder pill ──────────────────────────────────────── */
    .btn-sm.folder-btn {
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.3);
    }

    .btn-sm.folder-btn:hover {
      background: rgba(245, 158, 11, 0.08);
    }

    .btn-share.link {
      color: var(--accent2);
      border-color: rgba(124, 58, 237, 0.3);
    }

    .btn-share.link:hover {
      background: rgba(124, 58, 237, 0.1);
    }

    .folder-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      margin-left: 6px;
      border: 1px solid;
      vertical-align: middle;
    }

    .folder-picker {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .folder-option {
      display: inline-block;
      margin: 4px;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      border: 1px solid;
      transition: opacity .15s;
    }

    .folder-option:hover {
      opacity: .75;
    }

    .folder-option.remove {
      color: var(--muted);
      border-color: var(--border);
    }

    /* ── Mobile responsive ────────────────────────────────── */
    @media (max-width: 640px) {
      .page {
        padding: 16px 12px;
      }

      header {
        flex-wrap: wrap;
        gap: 10px;
      }

      .toolbar {
        flex-direction: column;
        gap: 8px;
      }

      .search-field-wrap {
        width: 100%;
      }

      .search-box {
        width: 100%;
      }

      .filter {
        width: 100%;
      }

      .stats-row {
        display: flex;
        flex-wrap: wrap;
      }

      .card-header {
        flex-wrap: wrap;
        gap: 8px;
      }

      .card-actions {
        flex-wrap: wrap;
      }

      .card-meta {
        flex-wrap: wrap;
        gap: 6px;
      }

      .card-body-actions {
        flex-wrap: wrap;
        gap: 6px;
      }

      .btn-sm {
        font-size: 10px;
        padding: 5px 10px;
      }

      .share-panel {
        flex-wrap: wrap;
      }

      .btn-share {
        flex: 1 1 calc(50% - 4px);
        text-align: center;
      }

      .translate-row {
        flex-direction: column;
      }

      .translate-select {
        width: 100%;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
  <script src="/auth-helper.js"></script>
</head>

<body>
  <div class="page">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">📋</div>
        <div class="logo-text">Session <span>History</span></div>
        <div class="badge">SAARAS V3</div>
      </div>
      <div style="display:flex;gap:8px;">
        <a href="/live" class="btn-back">🎙 Live</a>
        <a href="/history" class="btn-back" style="border-color:rgba(0,212,255,0.4);color:#00d4ff;">📋 History</a>
        <a href="/studio" class="btn-back">🧠 Studio</a>
        <a href="/dashboard" class="btn-back">📊 Dashboard</a>
      </div>
      <div id="userMenu" style="display:none;align-items:center;gap:10px;">
        <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#6b8299;" id="userName"></span>
        <a id="adminLink" href="/admin"
          style="display:inline-flex;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:7px;color:#ef4444;text-decoration:none;">🛡
          Admin</a>
        <button onclick="doLogout()"
          style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;background:transparent;border:1px solid #1e2d40;border-radius:7px;color:#6b8299;cursor:pointer;"
          onmouseover="this.style.color='#ef4444';this.style.borderColor='rgba(239,68,68,0.4)'"
          onmouseout="this.style.color='#6b8299';this.style.borderColor='#1e2d40'">⎋ Logout</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="val" id="totalSessions">—</div>
        <div class="lbl">TOTAL SESSIONS</div>
      </div>
      <div class="stat-card">
        <div class="val" id="totalSentences">—</div>
        <div class="lbl">TOTAL SENTENCES</div>
      </div>
      <div class="stat-card">
        <div class="val" id="totalWords">—</div>
        <div class="lbl">TOTAL WORDS</div>
      </div>
      <div class="stat-card">
        <div class="val" id="totalDuration">—</div>
        <div class="lbl">LANGUAGES USED</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-field-wrap">
        <input class="search-box" id="searchBox" type="text" placeholder="Search transcripts..."
          oninput="onSearchInput()" />
        <select class="filter" id="searchField">
          <option value="all">All Fields</option>
          <option value="transcript">Raw</option>
          <option value="corrected_transcript">Corrected</option>
          <option value="filtered_transcript">Filtered</option>
          <option value="summary">Summary</option>
        </select>
      </div>
      <select class="filter" id="modeFilter" onchange="filterSessions()">
        <option value="">All Modes</option>
        <option value="translate">Translate</option>
        <option value="transcribe">Transcribe</option>
        <option value="codemix">Codemix</option>
      </select>
      <select class="filter" id="sortFilter" onchange="filterSessions()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="longest">Most Words</option>
      </select>
    </div>

    <!-- Session List -->
    <div class="session-list" id="sessionList">
      <div class="loading"><span class="spinner"></span>Loading sessions...</div>
    </div>

  </div>

  <!-- Word Cloud Modal -->
  <div class="wc-modal-overlay" id="wcOverlay" onclick="closeWordCloud(event)">
    <div class="wc-modal" onclick="event.stopPropagation()">
      <div class="wc-header">
        <span class="wc-title">☁ Word Cloud</span>
        <button class="wc-close" onclick="closeWordCloud()">✕</button>
      </div>
      <canvas id="wcCanvas" width="560" height="320"></canvas>
    </div>
  </div>

  <script>
    let allSessions = [];

    // ── Fetch sessions from API ────────────────────────────────────────────────
    async function loadSessions() {
      loadFolders();  // load folders in parallel
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        allSessions = data;
        updateStats(data);
        renderSessions(data);
      } catch (e) {
        showError('Could not connect to server — is main.py running?');
      }
    }

    // ── Stats ──────────────────────────────────────────────────────────────────
    function updateStats(sessions) {
      document.getElementById('totalSessions').textContent = sessions.length;
      document.getElementById('totalSentences').textContent = sessions.reduce((a, s) => a + (s.sentence_count || 0), 0);
      document.getElementById('totalWords').textContent = sessions.reduce((a, s) => a + (s.word_count || 0), 0).toLocaleString();
      const langs = [...new Set(sessions.map(s => s.language))];
      document.getElementById('totalDuration').textContent = langs.length;
    }

    // ── Search ────────────────────────────────────────────────────────────────
    let searchTimer = null;

    function onSearchInput() {
      clearTimeout(searchTimer);
      const q = document.getElementById('searchBox').value.trim();
      if (q.length === 0) { filterSessions(); return; }
      // Debounce: wait 400ms then search
      searchTimer = setTimeout(() => doSearch(q), 400);
    }

    async function doSearch(q) {
      const field = document.getElementById('searchField').value;
      const mode = document.getElementById('modeFilter').value;
      try {
        document.getElementById('sessionList').innerHTML = '<div class="loading"><span class="spinner"></span>Searching...</div>';
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&field=${field}`);
        const sessions = await res.json();
        let filtered = sessions;
        if (mode) filtered = sessions.filter(s => s.mode === mode);
        renderSessions(filtered, q);
      } catch (e) {
        filterSessions();
      }
    }

    function filterSessions() {
      const query = document.getElementById('searchBox').value.toLowerCase().trim();
      const mode = document.getElementById('modeFilter').value;
      const sort = document.getElementById('sortFilter').value;

      let filtered = allSessions.filter(s => {
        const fields = [s.transcript, s.corrected_transcript, s.filtered_transcript, s.summary, s.session_id];
        const matchText = !query || fields.some(f => (f || '').toLowerCase().includes(query));
        const matchMode = !mode || s.mode === mode;
        return matchText && matchMode;
      });

      if (sort === 'oldest') filtered.sort((a, b) => a.started_at.localeCompare(b.started_at));
      if (sort === 'newest') filtered.sort((a, b) => b.started_at.localeCompare(a.started_at));
      if (sort === 'longest') filtered.sort((a, b) => (b.word_count || 0) - (a.word_count || 0));

      renderSessions(filtered, query);
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function renderSessions(sessions, query = '') {
      const list = document.getElementById('sessionList');

      if (!sessions.length) {
        list.innerHTML = `
      <div class="empty-state">
        <div class="icon">🗂️</div>
        <h3>No sessions found</h3>
        <p>Start a live transcription session to see it here.</p>
      </div>`;
        return;
      }

      list.innerHTML = sessions.map((s, i) => {
        const date = formatDate(s.started_at);
        const duration = calcDuration(s.started_at, s.ended_at);
        // Highlight search matches in preview
        const rawPreview = (s.corrected_transcript || s.transcript || '').slice(0, 150).replace(/\n/g, ' ');
        const preview = query ? highlightText(escHtml(rawPreview), query) : escHtml(rawPreview) + '...';
        const modeClass = `mode-${s.mode || 'transcribe'}`;
        const langLabel = langName(s.language);

        return `
    <div class="session-card" id="card-${i}" onclick="toggleCard(${i})">
      <div class="card-header">
        <div class="card-icon">🎙️</div>
        <div class="card-info">
          <div class="card-title">
            ${s.title ? `<span style="color:var(--text)">${escHtml(s.title)}</span>` : `${date} — ${langLabel}`}
          </div>
          ${s.title ? `<div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:4px;">${date} · ${langLabel}</div>` : ''}
          <div class="card-meta">
            <span>${duration}</span>
            <span>${s.sentence_count || 0} sentences</span>
            <span>${(s.word_count || 0).toLocaleString()} words</span>
            <span class="pill ${modeClass}">${(s.mode || 'transcribe').toUpperCase()}</span>
            ${s.filtered_transcript ? '<span class="pill" style="color:#f59e0b;border-color:rgba(245,158,11,0.3);">⚗ FILTERED</span>' : ''}
            ${s.corrected_transcript ? '<span class="pill" style="color:#22c55e;border-color:rgba(34,197,94,0.3);">✓ CORRECTED</span>' : ''}
            ${s.summary ? '<span class="pill" style="color:#7c3aed;border-color:rgba(124,58,237,0.3);">📝 SUMMARY</span>' : ''}
            ${s.notes ? '<span class="pill" style="color:#00d4ff;border-color:rgba(0,212,255,0.3);">📚 NOTES</span>' : ''}
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-icon" title="Word Cloud" onclick="event.stopPropagation(); showWordCloud(${i})">☁</button>
          <button class="btn-icon" title="Copy" onclick="event.stopPropagation(); copySession(${i})">⎘</button>
          <div class="dl-dropdown">
            <button class="btn-icon" title="Download" onclick="event.stopPropagation(); toggleDlMenu(event, ${i})">↓ ▾</button>
            <div class="dl-menu" id="dlMenu-${i}">
              <button onclick="event.stopPropagation(); downloadSession(${i},'raw')">↓ Raw Transcript</button>
              <button onclick="event.stopPropagation(); downloadSession(${i},'corrected')">↓ Punctuation Corrected</button>
              <button onclick="event.stopPropagation(); downloadSession(${i},'filtered')">↓ Filtered (Engineering)</button>
              <button onclick="event.stopPropagation(); exportPDF(${i})">↓ Export as PDF</button>
              ${s.notes ? `
              <hr style="border-color:rgba(255,255,255,0.1);margin:4px 0;">
              <button onclick="event.stopPropagation(); downloadNotes(${i},'txt')">📘 Notes + Summary (.txt)</button>
              <button onclick="event.stopPropagation(); downloadNotes(${i},'doc')">📘 Notes + Summary (.doc)</button>
              <button onclick="event.stopPropagation(); exportNotesPDF(${i})">📘 Notes + Summary (.pdf)</button>
              ` : ''}
            </div>
          </div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="card-body">
        ${s.summary ? '<div style="background:var(--surface2);padding:14px;border-radius:8px;margin-bottom:12px;border:1px solid rgba(124,58,237,0.3);"><strong style="color:var(--accent2);font-size:12px;">📝 AI SUMMARY</strong><p style="font-size:13px;margin-top:6px;line-height:1.6;white-space:pre-wrap;color:var(--text);">' + escHtml(s.summary) + '</p></div>' : ''}
        ${s.notes ? '<div style="background:var(--surface2);padding:14px;border-radius:8px;margin-bottom:12px;border:1px solid rgba(0,212,255,0.3);"><strong style="color:var(--accent);font-size:12px;">📚 AI STUDY NOTES</strong><p style="font-size:13px;margin-top:6px;line-height:1.6;white-space:pre-wrap;color:var(--text);">' + escHtml(s.notes) + '</p></div>' : ''}
        <div class="transcript-text" id="transcript-${i}">${escHtml(s.transcript || '')}</div>
        <div class="card-body-actions">
          <button class="btn-sm copy" onclick="copySession(${i})">⎘ Copy</button>
          <div class="dl-dropdown">
            <button class="btn-sm dl" onclick="event.stopPropagation(); toggleDlMenu(event, ${i})">↓ Download ▾</button>
            <div class="dl-menu" id="dlMenuB-${i}">
              <button onclick="event.stopPropagation(); downloadSession(${i},'raw')">↓ Raw Transcript</button>
              <button onclick="event.stopPropagation(); downloadSession(${i},'corrected')">↓ Punctuation Corrected</button>
              <button onclick="event.stopPropagation(); downloadSession(${i},'filtered')">↓ Filtered (Engineering)</button>
              <button onclick="event.stopPropagation(); exportPDF(${i})">↓ Export as PDF</button>
              ${s.notes ? `
              <hr style="border-color:rgba(255,255,255,0.1);margin:4px 0;">
              <button onclick="event.stopPropagation(); downloadNotes(${i},'txt')">📘 Notes + Summary (.txt)</button>
              <button onclick="event.stopPropagation(); downloadNotes(${i},'doc')">📘 Notes + Summary (.doc)</button>
              <button onclick="event.stopPropagation(); exportNotesPDF(${i})">📘 Notes + Summary (.pdf)</button>
              ` : ''}
            </div>
          </div>
          <button class="btn-sm translate" onclick="event.stopPropagation(); openTranslate(${i})">🌐 Translate</button>
          <button class="btn-sm share"     onclick="event.stopPropagation(); openShare(${i})">📤 Share</button>
          <button class="btn-sm folder-btn" onclick="event.stopPropagation(); openFolderPicker(${i})">📂 Folder</button>
        </div>
        <!-- Translate Panel -->
        <div class="translate-panel" id="translatePanel-${i}" style="display:none;">
          <div class="translate-row">
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--accent2);letter-spacing:0.5px;">🌐 TRANSLATE TO</span>
            <button onclick="event.stopPropagation(); document.getElementById('translatePanel-'+${i}).style.display='none'" 
              style="margin-left:auto;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px;">✕</button>
          </div>
          <div class="translate-row">
            <select class="translate-select" id="translateLang-${i}" onclick="event.stopPropagation()">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="ta">Tamil</option>
              <option value="te">Telugu</option>
              <option value="kn">Kannada</option>
              <option value="ml">Malayalam</option>
              <option value="bn">Bengali</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
              <option value="de">German</option>
              <option value="ja">Japanese</option>
              <option value="zh">Chinese</option>
              <option value="ar">Arabic</option>
            </select>
            <button class="btn-sm translate" id="translateBtn-${i}" onclick="event.stopPropagation(); doTranslate(${i})">Translate</button>
          </div>
          <div class="translate-result" id="translateResult-${i}"></div>
        </div>
        <!-- Share Panel -->
        <div class="share-panel" id="sharePanel-${i}" style="display:none;">
          <button class="btn-share email" onclick="shareEmail(${i})">✉ Email</button>
          <button class="btn-share whatsapp" onclick="shareWhatsApp(${i})">💬 WhatsApp</button>
          <button class="btn-share link" id="shareLink-${i}" onclick="toggleShareLink(${i})">
            ${s.is_public ? '🔓 Disable Link' : '🔗 Get Share Link'}
          </button>
        </div>
        <div id="shareLinkBox-${i}" style="display:none;margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--accent);word-break:break-all;"></div>
        <!-- Folder picker -->
        <div class="folder-picker" id="folderPicker-${i}" style="display:none;">
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;">📂 MOVE TO FOLDER</div>
          <div id="folderPickerList-${i}"></div>
        </div>
      </div>
    </div>`;
      }).join('');
    }

    // ── Toggle expand ──────────────────────────────────────────────────────────
    function toggleCard(i) {
      const card = document.getElementById(`card-${i}`);
      card.classList.toggle('expanded');
    }

    // ── Copy ───────────────────────────────────────────────────────────────────
    function copySession(i) {
      const s = allSessions[i];
      const text = (s.filtered_transcript && s.filtered_transcript.trim())
        ? s.filtered_transcript : (s.transcript || '');
      navigator.clipboard.writeText(text).then(() => {
        showToast('✓ Copied to clipboard');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = s.transcript || '';
        document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('✓ Copied');
      });
    }

    // ── Download ───────────────────────────────────────────────────────────────
    function downloadSession(i, type = 'raw') {
      closeAllDlMenus();
      const s = allSessions[i];
      const date = (s.started_at || '').slice(0, 10);
      let text, label;
      if (type === 'filtered' && s.filtered_transcript && s.filtered_transcript.trim()) {
        text = s.filtered_transcript;
        label = 'filtered';
      } else if (type === 'corrected' && s.corrected_transcript && s.corrected_transcript.trim()) {
        text = s.corrected_transcript;
        label = 'corrected';
      } else {
        if (type !== 'raw') showToast(`No ${type} transcript for this session`);
        text = s.transcript || '';
        label = 'raw';
      }
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `transcript-${label}-${date}-${s.session_id}.txt`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(`✓ Downloaded ${label} transcript`);
    }

    function downloadNotes(i, format) {
      closeAllDlMenus();
      const s = allSessions[i];
      if (!s.notes) return showToast('No notes available for this session');
      
      const date = (s.started_at || '').slice(0, 10);
      let textContent = s.notes;
      if (s.summary) {
        textContent += '\\n\\n' + '─'.repeat(40) + '\\nSUMMARY\\n' + s.summary;
      }
      
      let blob, ext;
      if (format === 'txt') {
        blob = new Blob([textContent], { type: 'text/plain' });
        ext = 'txt';
      } else if (format === 'doc') {
        let html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">';
        html += '<head><meta charset="utf-8"><title>Study Notes</title></head><body style="font-family: Arial, sans-serif; line-height: 1.6;">';
        html += '<h2>AI Study Notes</h2>' + s.notes.split('\\n').filter(p=>p.trim()).map(p => '<p>' + escHtml(p) + '</p>').join('');
        if (s.summary) {
           html += '<hr><h2>AI Summary</h2>' + s.summary.split('\\n').filter(p=>p.trim()).map(p => '<p>' + escHtml(p) + '</p>').join('');
        }
        html += '</body></html>';
        blob = new Blob(['\\ufeff', html], { type: 'application/msword' });
        ext = 'doc';
      }
      
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; 
      a.download = `study-notes-${date}-${s.session_id}.${ext}`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(`✓ Downloaded Notes (${ext.toUpperCase()})`);
    }

    function exportNotesPDF(i) {
      closeAllDlMenus();
      const s = allSessions[i];
      if (!s.notes) return;
      const date = formatDate(s.started_at);
      const lang = langName(s.language);
      
      let notesHtml = s.notes.split('\\n').filter(p=>p.trim()).map(p => '<p>' + escHtml(p) + '</p>').join('');
      let summaryHtml = s.summary ? '<h2 style="margin-top:40px;border-bottom:1px solid #ccc;padding-bottom:10px;">AI Summary</h2>' + s.summary.split('\\n').filter(p=>p.trim()).map(p => '<p>' + escHtml(p) + '</p>').join('') : '';

      const win = window.open('', '_blank');
      win.document.write(
        '<!DOCTYPE html><html><head>' +
        '<meta charset="UTF-8">' +
        '<title>Study Notes — ' + date + '</title>' +
        '<style>' +
        'body{font-family:Georgia,serif;max-width:750px;margin:40px auto;color:#111;line-height:1.8;}' +
        '.meta{border-bottom:2px solid #333;padding-bottom:16px;margin-bottom:24px;}' +
        'h1{font-size:22px;margin:0 0 8px;}' +
        '.tags{display:flex;gap:12px;font-size:12px;color:#555;font-family:monospace;}' +
        '.tag{background:#f0f0f0;padding:2px 8px;border-radius:4px;}' +
        'p{margin:0 0 16px;text-align:justify;}' +
        '@page{margin:2cm;}' +
        '</style></head><body>' +
        '<div class="meta">' +
        '<h1>📚 AI Study Notes</h1>' +
        '<div class="tags">' +
        '<span class="tag">📅 ' + date + '</span>' +
        '<span class="tag">🌐 ' + lang + '</span>' +
        '<span class="tag">🎙 ' + (s.mode || '').toUpperCase() + '</span>' +
        '</div></div>' +
        notesHtml +
        summaryHtml +
        '</body></html>'
      );
      win.document.close();
      setTimeout(() => { win.print(); }, 400);
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function formatDate(iso) {
      if (!iso) return 'Unknown';
      const d = new Date(iso);
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) +
        ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function calcDuration(start, end) {
      if (!start || !end) return '—';
      const diff = Math.floor((new Date(end) - new Date(start)) / 1000);
      if (diff < 60) return `${diff}s`;
      return `${Math.floor(diff / 60)}m ${diff % 60}s`;
    }

    function langName(code) {
      const map = {
        'hi-IN': 'Hindi', 'en-IN': 'English', 'ta-IN': 'Tamil', 'te-IN': 'Telugu',
        'kn-IN': 'Kannada', 'ml-IN': 'Malayalam', 'bn-IN': 'Bengali', 'mr-IN': 'Marathi',
        'gu-IN': 'Gujarati', 'pa-IN': 'Punjabi', 'or-IN': 'Odia',
      };
      return map[code] || code || 'Unknown';
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function showError(msg) {
      document.getElementById('sessionList').innerHTML = `
    <div class="empty-state">
      <div class="icon">⚠️</div>
      <h3>Error loading sessions</h3>
      <p>${msg}</p>
    </div>`;
    }

    // ── Download menu helpers ──────────────────────────────────────────────────
    function toggleDlMenu(e, i) {
      e.stopPropagation();
      const btn = e.currentTarget;
      const menu = btn.nextElementSibling;
      const isOpen = menu && menu.classList.contains('open');
      closeAllDlMenus();
      if (!isOpen && menu && menu.classList.contains('dl-menu')) {
        menu.classList.add('open');
      }
    }

    function closeAllDlMenus() {
      document.querySelectorAll('.dl-menu.open').forEach(m => m.classList.remove('open'));
    }

    document.addEventListener('click', closeAllDlMenus);

    // ── Toast ──────────────────────────────────────────────────────────────────
    let toastEl = null;
    function showToast(msg) {
      if (!toastEl) {
        toastEl = document.createElement('div');
        toastEl.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
      background:#0f1620;border:1px solid #22c55e;color:#22c55e;padding:9px 18px;border-radius:8px;
      font-family:'JetBrains Mono',monospace;font-size:12px;z-index:999;
      transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);`;
        document.body.appendChild(toastEl);
      }
      toastEl.textContent = msg;
      toastEl.style.transform = 'translateX(-50%) translateY(0)';
      setTimeout(() => toastEl.style.transform = 'translateX(-50%) translateY(60px)', 2500);
    }

    // ── downloadSession with corrected support ────────────────────────────────


    // ── PDF Export ────────────────────────────────────────────────────────────────
    function exportPDF(i) {
      closeAllDlMenus();
      const s = allSessions[i];
      const date = formatDate(s.started_at);
      const text = s.corrected_transcript || s.transcript || '';
      const lang = langName(s.language);
      let extraHtml = '';
      if (s.summary) {
        extraHtml += '<div class="summary-box"><strong>AI Summary:</strong><br>' + escHtml(s.summary).replace(/\n/g, '<br>') + '</div>';
      }
      if (s.notes) {
        extraHtml += '<div class="summary-box" style="border-left-color:#00d4ff;"><strong>AI Study Notes:</strong><br>' + escHtml(s.notes).replace(/\n/g, '<br>') + '</div>';
      }
      const bodyHtml = text.split('\\n\\n').map(p => '<p>' + escHtml(p) + '</p>').join('');

      const win = window.open('', '_blank');
      win.document.write(
        '<!DOCTYPE html><html><head>' +
        '<meta charset="UTF-8">' +
        '<title>Transcript — ' + date + '</title>' +
        '<style>' +
        'body{font-family:Georgia,serif;max-width:750px;margin:40px auto;color:#111;line-height:1.8;}' +
        '.meta{border-bottom:2px solid #333;padding-bottom:16px;margin-bottom:24px;}' +
        'h1{font-size:22px;margin:0 0 8px;}' +
        '.tags{display:flex;gap:12px;font-size:12px;color:#555;font-family:monospace;}' +
        '.tag{background:#f0f0f0;padding:2px 8px;border-radius:4px;}' +
        'p{margin:0 0 16px;text-align:justify;}' +
        '.summary-box{background:#f9f9f9;border-left:3px solid #7c3aed;padding:12px 16px;margin-bottom:24px;font-size:14px;}' +
        '@page{margin:2cm;}' +
        '</style></head><body>' +
        '<div class="meta">' +
        '<h1>' + escHtml(s.title || 'Session Transcript') + '</h1>' +
        '<div class="tags">' +
        '<span class="tag">📅 ' + date + '</span>' +
        '<span class="tag">🌐 ' + lang + '</span>' +
        '<span class="tag">🎙 ' + (s.mode || '').toUpperCase() + '</span>' +
        '<span class="tag">📝 ' + (s.sentence_count || 0) + ' sentences</span>' +
        '<span class="tag">📖 ' + (s.word_count || 0).toLocaleString() + ' words</span>' +
        '</div></div>' +
        extraHtml +
        bodyHtml +
        '</body></html>'
      );
      win.document.close();
      setTimeout(() => { win.print(); }, 400);
    }

    // ── Translate ─────────────────────────────────────────────────────────────────
    function openTranslate(i) {
      const panel = document.getElementById(`translatePanel-${i}`);
      const share = document.getElementById(`sharePanel-${i}`);
      if (share) share.style.display = 'none';
      // Only toggle closed if already open AND no translation is shown
      const result = document.getElementById(`translateResult-${i}`);
      const isOpen = panel.style.display !== 'none';
      const hasResult = result && result.classList.contains('visible');
      if (isOpen && !hasResult) {
        panel.style.display = 'none';  // close only if empty
      } else {
        panel.style.display = 'block'; // always open
      }
    }

    async function doTranslate(i) {
      const s = allSessions[i];
      const lang = document.getElementById(`translateLang-${i}`).value;
      const btn = document.getElementById(`translateBtn-${i}`);
      const result = document.getElementById(`translateResult-${i}`);

      btn.disabled = true;
      btn.innerHTML = '<span class="translate-spinner"></span>Translating...';
      result.classList.remove('visible');

      try {
        const res = await fetch(`/api/sessions/${s.session_id}/translate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target_lang: lang })
        });
        const data = await res.json();
        if (data.error) {
          showToast('Translation failed: ' + data.error);
        } else {
          result.textContent = data.translated;
          result.classList.add('visible');
          showToast('✓ Translation complete');
          // Update local session cache
          allSessions[i][`translated_${lang}`] = data.translated;
        }
      } catch (e) {
        showToast('Translation request failed');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Translate';
      }
    }

    // ── Share ─────────────────────────────────────────────────────────────────────
    function openShare(i) {
      const panel = document.getElementById(`sharePanel-${i}`);
      const translate = document.getElementById(`translatePanel-${i}`);
      if (translate) translate.style.display = 'none';
      panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    }

    function shareEmail(i) {
      const s = allSessions[i];
      const date = formatDate(s.started_at);
      const summary = s.summary ? `Summary:\n${s.summary}\n\n` : '';
      const text = s.corrected_transcript || s.transcript || '';
      const body = `Transcript — ${date}\n${'─'.repeat(40)}\n\n${summary}${text}`;
      const subject = encodeURIComponent(`Transcript — ${date}`);
      const encoded = encodeURIComponent(body.slice(0, 4000));
      window.open(`mailto:?subject=${subject}&body=${encoded}`);
    }

    function shareWhatsApp(i) {
      const s = allSessions[i];
      const date = formatDate(s.started_at);
      // WhatsApp has ~2000 char limit — send summary or first 1500 chars
      const summary = s.summary ? s.summary : (s.transcript || '').slice(0, 1500);
      const text = `*Transcript — ${date}*\n\n${summary}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    // ── Word Cloud ───────────────────────────────────────────────────────────────
    const STOP_WORDS = new Set(['the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of',
      'with', 'is', 'are', 'was', 'were', 'be', 'been', 'have', 'has', 'had', 'do', 'does', 'did', 'will',
      'would', 'could', 'should', 'may', 'might', 'can', 'this', 'that', 'these', 'those', 'i', 'you',
      'he', 'she', 'it', 'we', 'they', 'what', 'which', 'who', 'how', 'when', 'where', 'so', 'if', 'not',
      'as', 'by', 'from', 'up', 'out', 'about', 'then', 'than', 'its', 'our', 'your', 'their', 'just',
      'also', 'now', 'like', 'very', 'more', 'some', 'such', 'even', 'there', 'here', 'all', 'any']);

    function showWordCloud(i) {
      const s = allSessions[i];
      const text = (s.corrected_transcript || s.transcript || '').toLowerCase();
      const freq = {};
      (text.match(/\b[a-z]{3,}\b/g) || []).forEach(w => {
        if (!STOP_WORDS.has(w)) freq[w] = (freq[w] || 0) + 1;
      });
      const words = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 80)
        .map(([word, count]) => [word, Math.max(12, Math.min(60, count * 8))]);

      document.getElementById('wcOverlay').classList.add('open');
      setTimeout(() => {
        WordCloud(document.getElementById('wcCanvas'), {
          list: words,
          gridSize: 8,
          weightFactor: 1,
          fontFamily: 'JetBrains Mono, monospace',
          color: () => ['#00d4ff', '#7c3aed', '#22c55e', '#f59e0b', '#e2eaf4'][Math.floor(Math.random() * 5)],
          backgroundColor: '#080c10',
          rotateRatio: 0.3,
          minSize: 10,
        });
      }, 50);
    }

    function closeWordCloud(e) {
      if (!e || e.target === document.getElementById('wcOverlay')) {
        document.getElementById('wcOverlay').classList.remove('open');
      }
    }

    // ── Text highlight helper ─────────────────────────────────────────────────────
    function highlightText(html, query) {
      if (!query) return html;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return html.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="highlight">$1</span>');
    }

    // ── Folders ──────────────────────────────────────────────────────────────────
    let allFolders = [];

    async function loadFolders() {
      try {
        const res = await fetch('/api/folders');
        allFolders = await res.json();
      } catch (e) { allFolders = []; }
    }

    function openFolderPicker(i) {
      // Close others
      document.querySelectorAll('.folder-picker').forEach(p => {
        if (p.id !== `folderPicker-${i}`) p.style.display = 'none';
      });
      const picker = document.getElementById(`folderPicker-${i}`);
      const list = document.getElementById(`folderPickerList-${i}`);
      const s = allSessions[i];
      if (picker.style.display !== 'none') { picker.style.display = 'none'; return; }

      const colors = ['#00d4ff', '#7c3aed', '#22c55e', '#f59e0b', '#ef4444'];
      list.innerHTML = `
    <span class="folder-option remove" onclick="assignFolder(${i},'')">✕ None</span>
    ${allFolders.map((f, fi) => `
      <span class="folder-option" style="color:${f.color || colors[fi % 5]};border-color:${f.color || colors[fi % 5]}55;background:${f.color || colors[fi % 5]}11;"
        onclick="assignFolder(${i},'${f.folder_id}')">
        ${escHtml(f.name)}${s.folder_id === f.folder_id ? ' ✓' : ''}
      </span>`).join('')}
    <span class="folder-option" style="color:var(--muted);border-color:var(--border);" onclick="createFolderPrompt(${i})">+ New Folder</span>
  `;
      picker.style.display = 'block';
    }

    async function assignFolder(i, folderId) {
      const s = allSessions[i];
      await fetch(`/api/sessions/${s.session_id}/folder`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folder_id: folderId })
      });
      allSessions[i].folder_id = folderId;
      document.getElementById(`folderPicker-${i}`).style.display = 'none';
      showToast(folderId ? '✓ Moved to folder' : '✓ Removed from folder');
      renderSessions(allSessions);
    }

    async function createFolderPrompt(i) {
      const name = prompt('Folder name:');
      if (!name) return;
      const colors = ['#00d4ff', '#7c3aed', '#22c55e', '#f59e0b', '#ef4444'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const res = await fetch('/api/folders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, color }) });
      const folder = await res.json();
      allFolders.push(folder);
      assignFolder(i, folder.folder_id);
    }

    // ── Share Link ────────────────────────────────────────────────────────────────
    async function toggleShareLink(i) {
      const s = allSessions[i];
      const enable = !s.is_public;
      const res = await fetch(`/api/sessions/${s.session_id}/share`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enable })
      });
      const data = await res.json();
      allSessions[i].is_public = enable;
      allSessions[i].share_token = enable ? data.share_url : null;

      const btn = document.getElementById(`shareLink-${i}`);
      const box = document.getElementById(`shareLinkBox-${i}`);
      if (enable && data.share_url) {
        const fullUrl = location.origin + data.share_url;
        box.textContent = fullUrl;
        box.style.display = 'block';
        navigator.clipboard.writeText(fullUrl).then(() => showToast('✓ Link copied!'));
        btn.textContent = '🔓 Disable Link';
      } else {
        box.style.display = 'none';
        btn.textContent = '🔗 Get Share Link';
        showToast('✓ Sharing disabled');
      }
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    loadSessions();
  </script>

  <script>
    // ── User menu ─────────────────────────────────────────────────────────────────
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) return;
        const user = await res.json();
        if (!user.email || user.email === 'local') return;
        const menu = document.getElementById('userMenu');
        if (menu) {
          document.getElementById('userName').textContent = user.name || user.email;
          menu.style.display = 'flex';
        }
        // Admin link conditionally visible
        const adminLink = document.getElementById('adminLink');
        if (adminLink && user.is_admin) {
          adminLink.style.display = 'inline-flex';
        } else if (adminLink) {
          adminLink.style.display = 'none';
        }
      } catch (e) { }
    })();

    async function doLogout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      localStorage.removeItem('auth_token');
      window.location.href = '/login';
    }
  </script>
</body>

</html>
